<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Techno Pieux — Suivi GMB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
  :root {
    /* Techno Pieux brand palette — vert officiel */
    --bg: #FFFFFF;
    --surface: #F5F5F5;
    --surface2: #EBEBEB;
    --border: #DDDDDD;
    --accent: #3CB043;
    --accent2: #2A8A30;
    --accent3: #1A6B20;
    --danger: #D32F2F;
    --text: #1A1A1A;
    --text-muted: #888888;
    --text-dim: #555555;
    --up: #3CB043;
    --down: #D32F2F;
    --neutral: #888888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before { display: none; }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  /* Header */
  header {
    margin-bottom: 56px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 40px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .logo-tag {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: nowrap;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Month groups */
  .month-group {
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .month-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .month-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .month-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .month-badge {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
  }

  /* Month blocks */
  .month-block {
    margin-bottom: 40px;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Metric cards row */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  @media (max-width: 900px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .metrics-grid { grid-template-columns: 1fr; }
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .metric-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(60,176,67,0.12);
  }

  .metric-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }

  .metric-card.web::before { background: var(--accent); }
  .metric-card.dir::before { background: var(--accent2); }
  .metric-card.calls::before { background: var(--accent3); }
  .metric-card.total::before { background: var(--text-dim); }

  .metric-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .years-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: nowrap;
  }

  .year-block {
    flex: 1;
    min-width: 0;
    text-align: center;
  }

  .year-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 4px;
  }

  .year-value {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: block;
    line-height: 1;
  }

  .year-value.na {
    font-size: 14px;
    color: var(--text-muted);
  }

  .variations {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }

  .var-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 3px;
    letter-spacing: 0.02em;
  }

  .var-tag.up {
    background: rgba(75, 232, 154, 0.12);
    color: var(--up);
    border: 1px solid rgba(75, 232, 154, 0.25);
  }

  .var-tag.down {
    background: rgba(232, 75, 75, 0.12);
    color: var(--down);
    border: 1px solid rgba(232, 75, 75, 0.25);
  }

  .var-tag.neutral {
    background: rgba(232, 176, 75, 0.12);
    color: var(--neutral);
    border: 1px solid rgba(232, 176, 75, 0.25);
  }

  .var-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .divider-year {
    width: 1px;
    background: var(--border);
    margin: 0 2px;
  }

  /* Summary bar */
  .summary-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 48px;
    display: flex;
    gap: 40px;
    flex-wrap: nowrap;
    align-items: center;
  }

  .sum-item { text-align: center; }
  .sum-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .sum-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }

  /* NA note */
  .na-note {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    font-style: italic;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    margin-top: 32px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 12px;
  }

  
  /* ── SELECTOR ── */
  .page-header {
    padding: 24px 32px 18px;
    border-bottom: 3px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 20px;
    background: #FFFFFF;
  }
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .brand-mark svg { display: block; }
  .brand-title {
    flex: 1;
  }
  .brand-title p {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 5px;
  }
  .selector-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .selector-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .selector-label {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .selector-wrapper { position: relative; flex: 1; max-width: 560px; }
  .sel-display {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 30px 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s;
    box-sizing: border-box;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sel-display:hover { border-color: var(--accent); }
  .sel-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 9px; }
  .sel-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #FFFFFF; border: 1px solid var(--border);
    border-radius: 4px; max-height: 360px; overflow-y: auto;
    z-index: 200; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.15);
    border-top: 2px solid var(--accent);
  }
  .sel-dropdown.open { display: block; }
  .dd-search { position: sticky; top: 0; padding: 8px 10px; background: #FFFFFF; border-bottom: 1px solid var(--border); }
  .dd-search input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono',monospace; font-size: 11px;
    padding: 6px 10px; border-radius: 3px; outline: none; box-sizing: border-box;
  }
  .dd-search input:focus { border-color: var(--accent); }
  .dd-opt {
    padding: 7px 14px; font-family: 'DM Mono',monospace; font-size: 11px;
    color: var(--text-dim); cursor: pointer; transition: background .1s, color .1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dd-opt:hover { background: var(--surface); color: var(--text); }
  .dd-opt.active { color: var(--accent); background: rgba(60,176,67,.10); }
  .dd-opt.all-opt { color: var(--text); font-size: 12px; border-bottom: 1px solid var(--border); padding: 9px 14px; }
  .dd-opt.all-opt.active { color: var(--accent); }
  .dd-group-hd {
    padding: 7px 14px 4px; font-size: 9px; color: var(--accent);
    letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background .1s, color .1s;
  }
  .dd-group-hd:hover { background: var(--surface2); color: var(--accent2); }
  .dd-group-hd.active { color: var(--accent2); }
  .dd-group-arrow { font-size: 8px; margin-left: auto; color: var(--text-muted); }
  .dd-opt.dealer { padding-left: 22px; font-size: 10.5px; }
  .mode-badge {
    font-size: 9px; padding: 3px 10px; border-radius: 2px;
    background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
    white-space: nowrap; flex-shrink: 0; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .mode-badge.country-mode { color: var(--accent2); border-color: var(--accent2); background: rgba(42,138,48,.08); }
  .mode-badge.dealer-mode { color: var(--accent); border-color: var(--accent); background: rgba(60,176,67,.10); }

  </style>
</head>

  const arrow = num > 0 ? '▲' : num < 0 ? '▼' : '—';
  const sign = num > 0 ? '+' : '';
  return `<span class="var-tag ${cls}" title="${yearA}→${yearB}">${arrow} ${sign}${v}%<span class="var-label" style="margin-left:4px">${yearA.toString().slice(2)}→${yearB.toString().slice(2)}</span></span>`;
}

// ═══ RENDER ════════════════════════════════════════════════════════════════════
function buildCard(month, metric) {
  const vals = years.map(y => getVal(month, y));

  const yearBlocks = years.map((y, i) => {
    const d = vals[i];
    const val = d ? d[metric.key].toLocaleString('fr-FR') : null;
    return `
      <div class="year-block">
        <span class="year-label">${y}</span>
        <span class="year-value${!val ? ' na' : ''}">${val ?? 'N/A'}</span>
      </div>
      ${i < years.length - 1 ? '<div class="divider-year"></div>' : ''}
    `;
  }).join('');

  const pairs = [[2023,2024],[2024,2025],[2025,2026]];
  const varTags = pairs.map(([ya, yb]) => {
    const a = getVal(month, ya), b = getVal(month, yb);
    if (!a || !b) return '';
    return varTag(a[metric.key], b[metric.key], ya, yb);
  }).filter(Boolean).join('');

  const variations = varTags ? `<div class="variations">${varTags}</div>` : '';

  return `
    <div class="metric-card ${metric.cls}">
      <div class="metric-label">${metric.label}</div>
      <div class="years-row">${yearBlocks}</div>
      ${variations}
    </div>
  `;
}

function buildMonth(month, idx) {
  const hasData = years.some(y => getVal(month, y) !== null);
  if (!hasData) return '';

  const delay = idx * 0.07;
  const badge = '';
  const cards = metrics.map(m => buildCard(month, m)).join('');

  return `
    <div class="month-block" style="animation-delay: ${delay}s">
      <div class="month-header">
        <span class="month-name">${month}</span>
        <div class="month-line"></div>
      </div>
      <div class="metrics-grid">${cards}</div>
    </div>
  `;
}

function renderReport() {
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('report').innerHTML = months.map((m, i) => buildMonth(m, i)).join('');
}

// ═══ SELECTOR ════════════════════════════════════════════════════════════════
function buildDD() {
  const list = document.getElementById('ddList');
  list.innerHTML = '';

  const allEl = document.createElement('div');
  allEl.className = 'dd-opt all-opt' + (selMode === 'network' ? ' active' : '');
  allEl.innerHTML = '🌐 &thinsp;Tous — Réseau complet';
  allEl.onclick = () => pick('network', null, '🌐 Tous — Réseau complet', 'Réseau complet', '');
  list.appendChild(allEl);

  for (const country of countryOrder) {
    const dealers = dealersByCountry[country] || [];
    const label = countryLabels[country] || country;
    const isCA = selMode === 'country' && selKey === country;

    const hd = document.createElement('div');
    hd.className = 'dd-group-hd' + (isCA ? ' active' : '');
    hd.dataset.country = country;
    hd.innerHTML = `<span>${label}</span><span class="dd-group-arrow">▸</span>`;
    hd.onclick = (e) => { e.stopPropagation(); pick('country', country, label + ' — Agrégat pays', label, 'country-mode'); };
    list.appendChild(hd);

    const grp = document.createElement('div');
    grp.dataset.grp = country;
    for (const name of dealers) {
      const item = document.createElement('div');
      item.className = 'dd-opt dealer' + (selMode === 'dealer' && selKey === name ? ' active' : '');
      item.textContent = name;
      item.dataset.name = name;
      item.dataset.country = country;
      item.onclick = (e) => { e.stopPropagation(); pick('dealer', name, name, label, 'dealer-mode'); };
      grp.appendChild(item);
    }
    list.appendChild(grp);
  }
}

function filterDD(q) {
  q = q.toLowerCase().trim();
  const list = document.getElementById('ddList');
  const allOpt = list.querySelector('.all-opt');
  if (allOpt) allOpt.style.display = q ? 'none' : '';

  const vis = new Set();
  list.querySelectorAll('.dd-opt.dealer').forEach(el => {
    const show = !q || el.dataset.name.toLowerCase().includes(q) || el.dataset.country.toLowerCase().includes(q);
    el.style.display = show ? '' : 'none';
    if (show && q) vis.add(el.dataset.country);
  });

  list.querySelectorAll('.dd-group-hd').forEach(el => {
    const c = el.dataset.country;
    const show = !q || (countryLabels[c]||c).toLowerCase().includes(q) || vis.has(c);
    el.style.display = show ? '' : 'none';
    const grp = list.querySelector(`[data-grp="${c}"]`);
    if (grp) grp.style.display = show ? '' : 'none';
  });
}

function pick(mode, key, displayText, badgeText, badgeClass) {
  selMode = mode; selKey = key;
  document.getElementById('selDisplay').textContent = displayText;
  const badge = document.getElementById('modeBadge');
  badge.textContent = badgeText;
  badge.className = 'mode-badge' + (badgeClass ? ' ' + badgeClass : '');
  closeDD();
  renderReport();
}

function toggleDD() {
  const dd = document.getElementById('selDD');
  if (dd.classList.contains('open')) { closeDD(); return; }
  dd.classList.add('open');
  buildDD();
  setTimeout(() => document.getElementById('ddQ').focus(), 40);
  document.addEventListener('click', outsideClick);
}

function closeDD() {
  document.getElementById('selDD').classList.remove('open');
  const si = document.getElementById('ddQ');
  if (si) { si.value = ''; filterDD(''); }
  document.removeEventListener('click', outsideClick);
}

function outsideClick(e) {
  if (!document.getElementById('selWrapper').contains(e.target)) closeDD();
}

// ═══ INIT ═════════════════════════════════════════════════════════════════════
renderReport();
</script>
</body>
